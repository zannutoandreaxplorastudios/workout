<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfaf7;
      --panel: rgba(255, 255, 255, .82);
      --card: #ffffff;
      --text: #1f1b16;
      --muted: #786f64;
      --line: rgba(39, 35, 29, .09);
      --accent: #e98a32;
      --accent-soft: rgba(233, 138, 50, .09);
      --accent-line: rgba(233, 138, 50, .25);
      --good: #15803d;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Manrope, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -120px -80px auto -80px;
      height: 360px;
      background:
        radial-gradient(circle at 20% 15%, rgba(233, 138, 50, .22), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(87, 166, 214, .16), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(126, 87, 194, .10), transparent 38%);
      filter: blur(30px);
      pointer-events: none;
      z-index: -1;
    }
    button, input, select { font: inherit; }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      padding: 11px 15px;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease, background .16s ease;
    }
    button:active { transform: scale(.97); }
    button.secondary {
      background: rgba(31, 27, 22, .06);
      color: var(--text);
    }
    button.danger {
      background: #fee2e2;
      color: var(--bad);
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      background: #fff;
      color: var(--text);
    }
    .app {
      max-width: 448px;
      margin: 0 auto;
      padding: 54px 20px 104px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 32px; line-height: 1; letter-spacing: 0; margin-bottom: 0; font-weight: 800; }
    h2 { font-size: 20px; margin-bottom: 0; font-weight: 800; }
    h3 { font-size: 17px; margin-bottom: 8px; }
    .eyebrow {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 28px; }
    .days { grid-template-columns: 1fr; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 16px 42px rgba(50, 42, 32, .06);
      backdrop-filter: blur(22px) saturate(150%);
    }
    .day-head, .row, .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .exercise { border-top: 0; padding: 6px 0; }
    .exercise:first-child { border-top: 0; }
    .target {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 600;
    }
    .pill {
      border: 0;
      border-radius: 999px;
      padding: 5px 10px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 10px 0;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .summary .card strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }
    .day-card { position: relative; overflow: hidden; }
    .day-card.next {
      background: var(--accent-soft);
      border-color: var(--accent-line);
      box-shadow: 0 18px 48px rgba(233, 138, 50, .10);
    }
    .exercise-card {
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(39, 35, 29, .07);
      border-radius: 18px;
      padding: 10px 11px;
      box-shadow: 0 10px 24px rgba(50, 42, 32, .035);
    }
    .exercise-separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(31, 27, 22, .10), transparent);
      margin: 3px 8px;
    }
    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 28px;
    }
    .exercise-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
      text-transform: capitalize;
    }
    .load {
      min-width: 52px;
      text-align: right;
      color: var(--accent);
      font-weight: 800;
      font-size: 14px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      min-width: 32px;
      padding: 0;
      display: grid;
      place-items: center;
      background: rgba(31, 27, 22, .055);
      color: var(--muted);
    }
    .duration-box {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      align-items: end;
      margin: 14px 0 8px;
      padding: 12px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,.50));
      border: 1px solid var(--line);
    }
    .duration-box label,
    .form-grid label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .section-title {
      margin: 48px 0 22px;
      font-size: 20px;
      font-weight: 800;
    }
    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      background: rgba(251, 250, 247, .86);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .bottom-nav button {
      min-width: 96px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }
    .bottom-nav button.active { background: var(--accent); color: #fff; }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0, 0, 0, .32);
      padding: 14px;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .sheet {
      width: min(620px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: var(--panel);
      border-radius: 28px;
      padding: 16px;
      border: 1px solid var(--line);
      backdrop-filter: blur(24px) saturate(150%);
    }
    .modal.report .sheet {
      max-height: calc(100vh - 28px);
      overflow: hidden;
      padding: 12px;
      border-radius: 24px;
    }
    .report-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .report-head h2 {
      font-size: 18px;
      margin-bottom: 3px;
    }
    .report-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .metric-card {
      border-radius: 16px;
      padding: 9px;
      background: rgba(255,255,255,.74);
      border: 1px solid var(--line);
    }
    .metric-card span {
      color: var(--muted);
      display: block;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .metric-card strong {
      display: block;
      font-size: 19px;
      margin-top: 2px;
    }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .report-ex {
      border-radius: 13px;
      padding: 7px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(39, 35, 29, .07);
      min-width: 0;
    }
    .report-ex strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      line-height: 1.15;
    }
    .report-ex span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }
    .report-foot {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .hidden { display: none !important; }
    .error {
      padding: 12px;
      border-radius: 8px;
      background: #fee2e2;
      color: var(--bad);
      margin-bottom: 12px;
    }
    .ok { color: var(--good); }
    @media (max-width: 640px) {
      .form-grid, .summary { grid-template-columns: 1fr; }
      .row { align-items: flex-start; }
      button { padding: 9px 11px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar">A</div>
        <div>
          <p class="eyebrow">Andrea's Schedule</p>
          <h1>Workout</h1>
        </div>
      </div>
      <button id="refreshBtn" class="secondary" aria-label="Aggiorna">↻</button>
    </header>
    <div id="error" class="error hidden"></div>
    <section id="dashboard"></section>
    <section id="active" class="hidden"></section>
    <section id="history" class="hidden"></section>
  </main>

  <nav class="bottom-nav">
    <button data-view="dashboard" class="active">Workout</button>
    <button data-view="active">In corso</button>
    <button data-view="history">Storico</button>
  </nav>

  <div id="modal" class="modal">
    <div class="sheet">
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const userId = "andrea";
    const apiBase = `${window.location.origin}/api`;
    const state = {
      plans: [],
      sessions: [],
      activeDay: null,
      activeExercises: [],
      startedAt: null,
      nextDay: 1,
      durationMinutes: 1,
      durationTouched: false,
      view: "dashboard"
    };

    const $ = (selector) => document.querySelector(selector);
    const errorBox = $("#error");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.toggle("hidden", !message);
    }

    async function request(path, options = {}) {
      const res = await fetch(`${apiBase}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `Errore ${res.status}`);
      }
      return res.json();
    }

    function target(ex) {
      if (!ex || ex.reps <= 0) return ex.notes || "10 min";
      return `${ex.sets}x${ex.rep_range || ex.reps}`;
    }

    function loadValue(load) {
      if (!load || load === "Bodyweight") return 0;
      const match = String(load).match(/(\d+)/);
      return match ? Number(match[1]) : 0;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("it-IT", { day: "2-digit", month: "short", year: "numeric" });
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
    }

    async function loadData() {
      showError("");
      try {
        state.plans = await request(`/workout-plans?user_id=${userId}`);
        const next = await request(`/next-workout?user_id=${userId}`);
        state.sessions = await request(`/workout-sessions?user_id=${userId}`);
        state.nextDay = next.next_day || state.plans[0]?.day_number || 1;
        render();
      } catch (err) {
        showError("Non riesco a caricare i dati. " + err.message);
      }
    }

    function switchView(view) {
      state.view = view;
      ["dashboard", "active", "history"].forEach((id) => $(`#${id}`).classList.toggle("hidden", id !== view));
      document.querySelectorAll(".bottom-nav button").forEach((btn) => {
      btn.classList.toggle("active", btn.dataset.view === view);
      });
      render();
    }

    function render() {
      renderDashboard();
      renderActive();
      renderHistory();
    }

    function renderDashboard() {
      const root = $("#dashboard");
      const cards = state.plans.map((plan) => `
        <article class="card day-card ${plan.day_number === state.nextDay ? "next" : ""}">
          <div class="day-head" style="margin-bottom:14px">
            <div>
              <div style="display:flex;align-items:center;gap:10px">
                <h2>${plan.name}</h2>
                ${plan.day_number === state.nextDay ? `<span class="pill">Next</span>` : ""}
              </div>
              <p class="muted" style="font-size:12px;margin:5px 0 0">${plan.exercises.length} Ex</p>
            </div>
            <button onclick="startWorkout(${plan.day_number})">Start</button>
          </div>
          <div class="grid" style="gap:8px">
            ${plan.exercises.map((ex, index) => `
              <div class="exercise-card">
                <div class="exercise-row">
                  <div style="min-width:0">
                    <div class="exercise-name">${ex.name}</div>
                    <div class="target"><span>${target(ex)}</span><span>${ex.rest_time || ""}</span></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div class="load">${ex.current_load === "Bodyweight" ? "—" : `${ex.current_load}kg`}</div>
                    <button class="icon-btn" onclick="editExercise(${plan.day_number}, '${ex.id}')" aria-label="Modifica">✎</button>
                  </div>
                </div>
                ${index < plan.exercises.length - 1 ? `<div class="exercise-separator"></div>` : ""}
              </div>
            `).join("")}
            ${plan.day_number === state.nextDay ? `<button style="width:100%;margin-top:18px;padding:14px" onclick="startWorkout(${plan.day_number})">Start Workout</button>` : ""}
          </div>
        </article>
      `).join("");
      root.innerHTML = `<div class="grid days">${cards || "<p>Nessun workout disponibile.</p>"}</div>`;
    }

    function renderActive() {
      const root = $("#active");
      if (!state.activeDay) {
        root.innerHTML = `<div class="card"><h2>Nessun workout in corso</h2><p class="muted">Scegli un Day dalla schermata Workout.</p></div>`;
        return;
      }
      const elapsed = getDurationMinutes();
      root.innerHTML = `
        <div class="card">
          <div class="day-head">
            <div>
              <h2>${state.activeDay.name}</h2>
              <p class="muted">Workout in corso</p>
            </div>
            <button onclick="finishWorkout()">Salva</button>
          </div>
          <div class="duration-box">
            <div>
              <span class="eyebrow" style="margin:0">Durata allenamento</span>
              <p class="muted" style="margin:4px 0 0;font-size:12px">Puoi modificarla prima del salvataggio</p>
            </div>
            <label>Minuti<input id="durationInput" type="number" min="1" value="${elapsed}" onchange="updateDuration(this.value)"></label>
          </div>
          ${state.activeExercises.map((ex, index) => `
            <div class="exercise-card" style="margin-top:9px">
              <div class="exercise-row">
                <strong class="exercise-name">${ex.name}</strong>
                <span class="pill">${target(ex)}</span>
              </div>
              <div class="target">
                <span>${ex.rest_time || ""}</span>
              </div>
              <div class="form-grid">
                <label>Serie<input type="number" min="0" value="${ex.sets}" onchange="updateActive(${index}, 'sets', this.value)"></label>
                <label>Ripetizioni<input type="number" min="0" value="${ex.reps}" onchange="updateActive(${index}, 'reps', this.value)"></label>
                <label>Carico<input value="${ex.load}" onchange="updateActive(${index}, 'load', this.value)"></label>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderHistory() {
      const root = $("#history");
      if (!state.sessions.length) {
        root.innerHTML = `<div class="card"><h2>Storico workout</h2><p class="muted">Nessun allenamento salvato.</p></div>`;
        return;
      }
      root.innerHTML = `
        <h2 class="section-title">Recent History</h2>
        <div class="grid">
          ${state.sessions.map((session) => {
            const volume = session.report?.total_volume || 0;
            return `
              <article class="card day-card" onclick="showSession('${session.id}')">
                <div class="row">
                  <div>
                    <span class="pill">${session.day_name}</span>
                    <p class="muted">${formatDate(session.completed_at)} · ${formatTime(session.completed_at)}</p>
                  </div>
                  <div style="text-align:right">
                    <strong>${session.duration_minutes}'</strong>
                    <p class="muted" style="font-size:11px;margin:2px 0 0">${volume}kg</p>
                  </div>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function startWorkout(dayNumber) {
      const plan = state.plans.find((item) => item.day_number === dayNumber);
      state.activeDay = plan;
      state.startedAt = Date.now();
      state.durationMinutes = 1;
      state.durationTouched = false;
      state.activeExercises = plan.exercises.map((ex) => ({
        exercise_id: ex.id,
        name: ex.name,
        sets: ex.sets,
        reps: ex.reps,
        rep_range: ex.rep_range || "",
        load: ex.current_load || "0",
        muscle_group: ex.muscle_group || "other",
        muscle_label: ex.muscle_label || "Other",
        completed: true,
        was_modified: false,
        original_name: ex.name
      }));
      switchView("active");
    }

    function getDurationMinutes() {
      if (state.durationTouched) return Math.max(1, Number(state.durationMinutes) || 1);
      return state.startedAt ? Math.max(1, Math.round((Date.now() - state.startedAt) / 60000)) : 1;
    }

    function updateDuration(value) {
      state.durationTouched = true;
      state.durationMinutes = Math.max(1, Number(value) || 1);
    }

    function updateActive(index, field, value) {
      const numeric = field === "sets" || field === "reps";
      state.activeExercises[index][field] = numeric ? Number(value) : value;
    }

    async function finishWorkout() {
      if (!state.activeDay) return;
      const duration = getDurationMinutes();
      try {
        const savedSession = await request(`/workout-sessions?user_id=${userId}`, {
          method: "POST",
          body: JSON.stringify({
            day_number: state.activeDay.day_number,
            day_name: state.activeDay.name,
            duration_minutes: duration,
            exercises: state.activeExercises
          })
        });
        state.activeDay = null;
        state.activeExercises = [];
        await loadData();
        switchView("history");
        openReport(savedSession);
      } catch (err) {
        showError("Salvataggio non riuscito. " + err.message);
      }
    }

    function editExercise(dayNumber, exerciseId) {
      const plan = state.plans.find((item) => item.day_number === dayNumber);
      const ex = plan.exercises.find((item) => item.id === exerciseId);
      $("#modalContent").innerHTML = `
        <h2>Modifica esercizio</h2>
        <label>Nome<input id="editName" value="${ex.name}"></label>
        <div class="form-grid">
          <label>Serie<input id="editSets" type="number" value="${ex.sets}"></label>
          <label>Ripetizioni<input id="editReps" type="number" value="${ex.reps}"></label>
          <label>Range<input id="editRange" value="${ex.rep_range || ""}"></label>
        </div>
        <div class="form-grid">
          <label>Carico<input id="editLoad" value="${ex.current_load || "0"}"></label>
          <label>Muscolo<input id="editMuscle" value="${ex.muscle_group || ""}"></label>
          <label>Etichetta<input id="editLabel" value="${ex.muscle_label || ""}"></label>
        </div>
        <div class="row">
          <button onclick="saveExercise(${dayNumber}, '${exerciseId}')">Salva</button>
          <button class="secondary" onclick="closeModal()">Annulla</button>
        </div>
      `;
      $("#modal").classList.add("open");
    }

    async function saveExercise(dayNumber, exerciseId) {
      try {
        await request(`/workout-plans/${dayNumber}/exercises/${exerciseId}?user_id=${userId}`, {
          method: "PUT",
          body: JSON.stringify({
            name: $("#editName").value,
            sets: Number($("#editSets").value),
            reps: Number($("#editReps").value),
            rep_range: $("#editRange").value,
            current_load: $("#editLoad").value,
            muscle_group: $("#editMuscle").value,
            muscle_label: $("#editLabel").value
          })
        });
        closeModal();
        await loadData();
      } catch (err) {
        showError("Modifica non riuscita. " + err.message);
      }
    }

    function showSession(id) {
      const session = state.sessions.find((item) => item.id === id);
      openReport(session);
    }

    function openReport(session) {
      const changes = session.report?.load_changes || [];
      const modified = session.exercises.filter((ex) => ex.was_modified);
      const volume = session.report?.total_volume || 0;
      $("#modal").classList.add("report");
      $("#modalContent").innerHTML = `
        <div class="report-head">
          <div>
            <span class="pill">${session.day_name}</span>
            <h2>Report workout</h2>
            <p class="muted" style="font-size:11px;margin:0">${formatDate(session.completed_at)} · ${formatTime(session.completed_at)}</p>
          </div>
          <button class="secondary" onclick="closeModal()" style="width:34px;height:34px;padding:0">×</button>
        </div>
        <div class="report-metrics">
          <div class="metric-card"><span>Durata</span><strong>${session.duration_minutes} min</strong></div>
          <div class="metric-card"><span>Volume totale</span><strong>${volume} kg</strong></div>
        </div>
        <div class="report-grid">
          ${session.exercises.map((ex) => `
            <div class="report-ex">
              <strong>${ex.name}</strong>
              <span>${ex.sets}x${ex.rep_range || ex.reps} · ${ex.load} kg</span>
            </div>
          `).join("")}
        </div>
        <div class="report-foot">
          <div>
            <strong style="color:var(--text)">Variazioni</strong>
            ${changes.length ? changes.map((item) => `<span> · ${item.exercise_name}: ${item.change_pct > 0 ? "+" : ""}${item.change_pct}%</span>`).join("") : `<span> · Nessuna</span>`}
          </div>
          <div>
            <strong style="color:var(--text)">Modifiche</strong>
            ${modified.length ? modified.map((ex) => `<span> · ${ex.original_name || ex.name} → ${ex.name}</span>`).join("") : `<span> · Nessuna</span>`}
          </div>
        </div>
      `;
      $("#modal").classList.add("open");
    }

    function closeModal() {
      $("#modal").classList.remove("open");
      $("#modal").classList.remove("report");
    }

    document.querySelectorAll(".bottom-nav button").forEach((btn) => {
      btn.addEventListener("click", () => switchView(btn.dataset.view));
    });
    $("#refreshBtn").addEventListener("click", loadData);
    $("#modal").addEventListener("click", (event) => {
      if (event.target.id === "modal") closeModal();
    });

    loadData();
  </script>
</body>
</html>
